worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Define a rate limiting zone for login endpoints
    # 10m memory zone, 10 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    
    # Generic API rate limiting (100 requests per minute)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    upstream nextjs_frontend {
        server frontend:3000;
    }

    upstream springboot_backend {
        server backend:8081;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend routing
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Apply strict rate limiting to Authentication endpoints
        location /api/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            limit_req_status 429;
            
            proxy_pass http://springboot_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route general API traffic with standard limits
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;
            
            proxy_pass http://springboot_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
