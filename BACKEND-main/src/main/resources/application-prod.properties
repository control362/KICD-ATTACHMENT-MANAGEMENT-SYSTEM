spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kicd_db}?sslmode=verify-full
spring.datasource.username=${DB_APP_USER}
spring.datasource.password=${DB_APP_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cap the connection pool to prevent DoS via exhaustion
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:20}
# Timeout any query taking longer than 5 seconds (5000ms)
spring.jpa.properties.javax.persistence.query.timeout=${DB_QUERY_TIMEOUT:5000}

# Flyway should run as an admin user to apply schema migrations
spring.flyway.enabled=true
spring.flyway.user=${DB_ADMIN_USER}
spring.flyway.password=${DB_ADMIN_PASSWORD}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

server.port=${PORT:8080}

# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# --- Account lockout policy ---
security.lockout.max-attempts=5
security.lockout.duration-minutes=15
