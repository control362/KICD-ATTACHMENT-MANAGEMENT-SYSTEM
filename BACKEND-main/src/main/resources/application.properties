spring.application.name=kicd
spring.profiles.active=dev

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kicd_db}
spring.datasource.username=${DB_APP_USER:kicd_app}
spring.datasource.password=${DB_APP_PASSWORD:app_password_123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema is owned by Flyway migrations (src/main/resources/db/migration).
# Hibernate only validates the mapped entities against that schema; it never
# creates or alters tables itself. This prevents the two migration
# mechanisms from fighting each other.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.user=${DB_ADMIN_USER:postgres}
spring.flyway.password=${DB_ADMIN_PASSWORD:admin123}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

server.port=8081

# --- JWT ---
# jwt.secret MUST be overridden via the JWT_SECRET environment variable in
# every real deployment. The value below is a dev-only fallback so the app
# still boots locally without extra setup; it is not safe for production.
jwt.secret=${JWT_SECRET:dev-only-change-me-2f8c1b6a9d4e7f0135792468ace13579}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# --- Account lockout policy ---
security.lockout.max-attempts=5
security.lockout.duration-minutes=15
